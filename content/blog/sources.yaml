# Allowlisted idea sources for blog discovery.
# We only use titles/summaries to invent ORIGINAL Liam's Call angles.
# Never scrape or republish full articles.

feeds:
  - id: samhsa-blog
    name: SAMHSA Blog
    url: https://www.samhsa.gov/blog/rss
    default_risk: review
    notes: "US federal behavioral health - prefer caregiver/family angles; mark clinical topics review."

  - id: samhsa-press
    name: SAMHSA Press Announcements
    url: https://www.samhsa.gov/newsroom/press-announcements/rss
    default_risk: review
    notes: "Only caregiver/family/behavioral-health education themes survive the relevance filter."

