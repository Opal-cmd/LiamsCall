# Weekly topic discovery from allowlisted reputable feeds/seeds
name: Blog discover

on:
  schedule:
    - cron: '0 13 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Discover topic ideas
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
        run: |
          export GEMINI_MODEL="${GEMINI_MODEL:-gemini-2.0-flash}"
          node scripts/blog-discover.js --limit=5
      - name: Commit updated topics queue
        run: |
          git config user.name "liamscall-blog-bot"
          git config user.email "blog-bot@liamscall.com"
          git add content/blog/topics.yaml
          if git diff --cached --quiet; then
            echo "No new topics"
          else
            git commit -m "Add discovered blog topic ideas"
            git push
          fi
